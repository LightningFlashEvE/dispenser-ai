# Nginx HTTPS 反代配置模板
# 使用方式：
#   1. 复制到 /etc/nginx/sites-available/dispenser-ai
#   2. 修改 ssl_certificate 和 ssl_certificate_key 路径为你的证书
#   3. 修改 server_name 为实际域名或 IP
#   4. ln -s /etc/nginx/sites-available/dispenser-ai /etc/nginx/sites-enabled/
#   5. nginx -t && systemctl reload nginx

server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /path/to/cert.pem;
    ssl_certificate_key /path/to/cert.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # 前端静态文件（Vite build 产物）
    root /home/lightning/dispenser-ai/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # API 和 WebSocket 反代到 FastAPI 后端
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ws/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
    }

    # 静态资源（如果单独托管）
    location /worklets/ {
        alias /home/lightning/dispenser-ai/frontend/public/worklets/;
        add_header Cache-Control "public, max-age=31536000";
    }
}

